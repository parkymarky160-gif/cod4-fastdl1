//
// Rotu 2 Beta Config
//
// Keep in mind that since Rotu2 is a complete rewrite of all scripts
// Some cod4 dvars and most Rotu1.15 dvars don't work any more

sets sv_hostname "^1# Rotu 2 Beta Server #"

//Info
set _Admin ""
set _Email ""
set _Website ""
set _Location ""
set _Mod "Reign of the Undead 2"
set _ModVer "2.00"

//Passwords
set rcon_password "" // Rcon pass
set sv_privatePassword "" // Private pass

//Voice
set sv_voice "1"
set sv_voiceQuality "3"
set voice_deadChat "1"
set voice_global "0"
set voice_localEcho "0"
set winvoice_mic_mute "1"

// Download
set sv_allowdownload "1"
set sv_wwwDownload "1"
set sv_wwwBaseURL ""
set sv_wwwDlDisconnected "0"

//Maprotation
set sv_maprotation " map mp_surv_vacant"



set g_allowVote "0" // Keep this 0


// Rotu 2 Settings
set sv_maxclients "64"
set bot_count 50 // Total bot count

set g_gametype surv // War works too

// Zombie Spawnprotection
set zom_spawnprot 1
set zom_spawnprot_decrease 1 // Spawnprotection decreases over time
set zom_spawnprot_time	6

//Difficulty
set game_difficulty 2 // 1 easy - 4 hardest
set zom_dynamicdifficulty 1 // Difficulty depends on amount of players

// Welcome Messages
set game_welcomemessage 0
set message_welcome1 "Welcome to our Rotu 2 Beta Server"
set message_welcome2 "Enjoy your stay!"

// Gameplay Settings
set game_rewardscale 25 // Points are multiplied by this number (not costs)
set game_startpoints 2000 // Starting points
set game_max_mg_barrels 4 // Set to 0 to disable
set game_max_turrets 5
set game_max_barrels 15
set game_max_portals 3

set game_mg_overheat 1
set game_mg_overheat_speed 2.5
set game_mg_cooldown_speed 1

set game_portal_time 180 // Time the portals stays
set game_mg_barrel_time 150
set game_turret_time 120

set game_spawn_requirement 0.5 // Percentage of players that need to be alive to spawn
set game_class_ranks 1 // Use class ranks, disable for LAN server


// Environment
set hud_survivors_left 1 // enable or disable
set hud_survivors_down 1 // enable or disable

set server_provider "" // will show up in the credits

set env_ambient 1 // Ambient music
set env_fog 1 // Fog is awesome
set env_fog_start_distance 200
set env_fog_half_distance 480
set env_blur .1 // Blur players screens

// Wave Settings
set surv_specialinterval 2 // One in two waves is a special wave
set surv_specialwaves 5 // How many special waves do you want?
set surv_zombies_perplayer 10
set surv_zombies_perwave 5
set surv_wavesystem 2
// Wavesystems:
// 0 : wavesize = players * surv_zombies_perplayer
// 1 : wavesize = wave# * surv_zombies_perwave
// 2 : wavesize = players * (wave# * surv_zombies_perwave + players * surv_zombies_perplayer
// 3 : wavesize = players * surv_zombies_perplayer + wave# * surv_zombies_perwave

set surv_slow_start 1 // Zombies don't sprint first few rounds
set surv_slow_waves 3 // First # waves zombie don't sprint, more zombies start sprinting each wave. Doesn't affect dogs/burning zombies.

// Survival Settings
set surv_defaultmode "waves_special" // There's also waves_endless
set surv_weaponmode "wawzombies" // Or use the old "upgrade" system, use dvars from the old mod!
set surv_waw_spawnprimary "none"
set surv_waw_spawnsecondary "beretta_mp"
set surv_waw_costs 750
set surv_waw_alwayspay 1 // Pay when using or when bought

// Shop costs
set shop_item1_costs 2000 // Restore Health
set shop_item2_costs 2000 // Restore Ammo
set shop_item3_costs 3500 // Cure Infection
set shop_item4_costs 1000 // Grenades
set shop_item5_costs 1250 // C4

set shop_defensive1_costs 1000 // Barrel
set shop_defensive2_costs 1250 // Claymore (not working in beta)
set shop_defensive3_costs 1750 // Exploding Barrel
set shop_defensive4_costs 4000 // Turret
set shop_defensive5_costs 7500 // MG-Barrel
set shop_defensive6_costs 10000 // Portal

exec mapvote.cfg
